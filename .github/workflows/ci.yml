name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "gd-ops/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true
  PNPM_VERSION: 11.5.1

jobs:
  privacy:
    name: Privacy leak guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check privacy leaks
        run: bash script/check_privacy.sh

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - privacy
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Format workspace
        run: cargo fmt --all -- --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Clippy workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  macos-app:
    name: Native macOS app bundle
    runs-on: macos-latest
    needs:
      - rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test native macOS list model
        run: pnpm test:macos-list-model

      - name: Verify native macOS layout
        run: pnpm verify:macos-ui-layout

      - name: Build SwiftPM macOS app
        run: swift build --package-path apps/macos

      - name: Build native macOS app bundle
        run: pnpm build:macos

      - name: Smoke macOS app bundle
        run: pnpm smoke:macos-app -- --bundle-only
